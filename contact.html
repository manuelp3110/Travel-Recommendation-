<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - TravelBloom</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- NAVBAR (no search bar) -->
    <nav>
        <div class="nav-logo">
            <span>🌸 TravelBloom</span>
        </div>
        <ul class="nav-links">
            <li><a href="./travel_recommendation.html">Home</a></li>
            <li><a href="./about.html">About Us</a></li>
            <li><a href="./contact.html">Contact Us</a></li>
        </ul>
    </nav>

    <!-- CONTACT SECTION -->
    <section class="contact-section">
        <h1>Contact Us</h1>
        <p>Have questions? We'd love to hear from you!</p>

        <form id="contactForm">
            <!-- Name input -->
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name"
                    placeholder="Your Name" required>
            </div>

            <!-- Email input -->
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email"
                    placeholder="Your Email" required>
            </div>

            <!-- Message textarea -->
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" rows="6"
                    placeholder="Write your message here..."
                    required></textarea>
            </div>

            <!-- Submit button -->
            <button type="submit"
                onclick="submitForm()">Submit</button>
        </form>

        <!-- Contact Info -->
        <div class="contact-info">
            <div class="contact-item">
                <i class="fas fa-envelope"></i>
                <p>info@travelbloom.com</p>
            </div>
            <div class="contact-item">
                <i class="fas fa-phone"></i>
                <p>+1 (555) 123-4567</p>
            </div>
            <div class="contact-item">
                <i class="fas fa-map-marker-alt"></i>
                <p>Dallas, Texas, USA</p>
            </div>
        </div>
    </section>

    <script>
        function submitForm() {
            event.preventDefault();
            alert('Thank you for contacting TravelBloom! We will get back to you soon. 🌸');
        }
    </script>
</body>
</html>

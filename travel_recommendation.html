<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelBloom</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav>
        <div class="nav-logo">
            <span>🌸 TravelBloom</span>
        </div>
    
        <ul class="nav-links">
            <li><a href="./travel_recommendation.html">Home</a></li>
            <li><a href="./about.html">About Us</a></li>
            <li><a href="./contact.html">Contact Us</a></li>
        </ul>
    
        <div class="search-bar">
            <input type="text" id="searchInput" 
                placeholder="Enter a keyword...">
            <button id="searchBtn" 
                onclick="searchRecommendations()">Search</button>
            <button id="resetBtn" 
                onclick="clearResults()">Reset</button>
        </div>
    </nav>

    <!-- HERO SECTION -->
<section class="hero">
    <div class="overlay"></div>
    <div class="hero-content">

        <!-- Social Media Icons -->
        <div class="social-links">
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
        </div>

        <!-- Headline -->
        <h1>Explore the World,<br>
            Discover Your Next<br>
            Destination</h1>

        <!-- Description -->
        <p>Immerse yourself in breathtaking cultures,
           stunning landscapes, and unforgettable
           experiences. Let TravelBloom guide you to
           your perfect destination.</p>

        <!-- Book Now Button -->
        <button class="book-btn">Book Now</button>
    </div>
</section>

<!-- RESULTS SECTION -->
<div id="results" class="results-container"></div>

    <script src="./travel_recommendation.js"></script>
</body>
</html>
